<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="static/css/bootstrap.css" rel="stylesheet">
    <link href="static/css/likes.css" rel="stylesheet" type="text/css" />
    <link href="static/css/class.css" rel="stylesheet" type="text/css" />
    <title>Вход - Домашняя книга рецептов</title>
</head>
<body class="custom_container">
    <div class="header">
        <h1><a href="header.html" style="color: white;">Домашняя книга рецептов</a></h1>
    </div>

    <div class="main" style="flex-wrap: wrap; margin-left: 20px;
            justify-content: flex-start;" >
                <div class="h2_custom">Вход в аккаунт</div>
                <p>Войдите, чтобы делиться рецептами и оценивать другие</p>
                
                <form action="#" method="post">
                    <div class="box_without_border" style="justify-content: flex-start; margin: 20px; gap: 10px;">
                        <label for="email">Электронная почта</label>
                        <input type="email" id="email" name="email" placeholder="example@mail.ru" required>
                    </div>
                    
                    <div class="box_without_border" style="justify-content: flex-start; margin: 20px; gap: 10px">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <error class="required-star">неправильный пароль</error>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-checkbox">
                            <input type="checkbox" name="remember"> Запомнить меня
                        </label>
                        <a href="#" class="forgot-link">Забыли пароль?</a>
                    </div>
                    
                    <button type="submit">Войти</button>
                </form>
                
                <div>
                    <p>Нет аккаунта? <a href="registr.html">Зарегистрируйтесь</a></p>
                </div>
    </div>
    
    <div class="side">
        <h2 class="h2_custom" style="margin-top: 40px;">Популярные теги</h2>
        <div class="tags">
            <a href='#' style="color: rgb(0, 255, 55);">Овощи</a>
            <a href="#" style="color: rgb(250, 67, 11);">Фрукты</a>
            <a href="#" style="color: rgb(0, 47, 255);">Ягоды</a>
            <a href="header_tag.html" style="color: rgba(255, 123, 0, 0.63);">Выпечка</a>
        </div>
        <h2 class="h2_custom" style="margin-top: 20px;">Лучшие пользователи</h2>
        <div class="users_tags">
            <a href="#">linking park</a>
            <a href="#">Mr chief</a>
            <a href="#">just a user</a>
        </div>
    </div>
    
    <div class="footer"></div>
</body>
</html>
